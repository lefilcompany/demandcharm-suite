name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}
  schedule:
    - cron: "0 3 * * *"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "true"

jobs:
  lint-and-typecheck:
    name: Lint + Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: ESLint
        run: bun run lint
      - name: TypeScript
        run: bunx tsc --noEmit

  unit:
    name: Unit tests (Vitest)
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Run Vitest
        run: bunx vitest run --reporter=default

  edge-functions:
    name: Edge Function tests (Deno)
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v1
        with: { deno-version: v1.x }
      - name: Check Edge Function entrypoints
        run: |
          set -o pipefail
          deno check \
            supabase/functions/check-deadlines/index.ts \
            supabase/functions/send-push-notification/index.ts 2>&1 | tee deno-check.log
      - name: Run Deno tests
        run: |
          set +e
          deno test --allow-net --allow-env --allow-read \
            supabase/functions/process-recurring-demands/ \
            supabase/functions/check-deadlines/ > deno-test.log 2>&1
          status=$?
          cat deno-test.log
          exit $status
      - name: Upload Deno validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deno-validation-logs
          path: |
            deno-check.log
            deno-test.log
          retention-days: 7

  e2e:
    name: E2E ${{ matrix.spec }}
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        spec:
          - boards
          - demands
          - members
          - services
    env:
      E2E_SEED_SECRET: ${{ secrets.E2E_SEED_SECRET }}
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
      E2E_BASE_URL: http://localhost:8080
    steps:
      - uses: actions/checkout@v4

      - name: Check E2E configuration
        id: e2e-config
        shell: bash
        run: |
          missing=()
          [[ -n "$E2E_SEED_SECRET" ]] || missing+=(E2E_SEED_SECRET)
          [[ -n "$VITE_SUPABASE_URL" ]] || missing+=(VITE_SUPABASE_URL)
          [[ -n "$VITE_SUPABASE_PUBLISHABLE_KEY" ]] || missing+=(VITE_SUPABASE_PUBLISHABLE_KEY)
          [[ -n "$VITE_SUPABASE_PROJECT_ID" ]] || missing+=(VITE_SUPABASE_PROJECT_ID)

          if (( ${#missing[@]} > 0 )); then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Selenium E2E skipped::Missing repository secrets: ${missing[*]}"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Explain skipped Selenium suite
        if: steps.e2e-config.outputs.configured != 'true'
        run: |
          echo "Selenium E2E requires the protected test Supabase project and seed secret."
          echo "The notification workflow is still covered end-to-end by the in-memory Deno scenario."

      - uses: actions/setup-node@v4
        if: steps.e2e-config.outputs.configured == 'true'
        with: { node-version: "20" }
      - uses: oven-sh/setup-bun@v2
        if: steps.e2e-config.outputs.configured == 'true'
        with: { bun-version: latest }
      - name: Install JS deps
        if: steps.e2e-config.outputs.configured == 'true'
        run: bun install --frozen-lockfile

      - name: Setup Python
        if: steps.e2e-config.outputs.configured == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: tests_selenium/requirements.txt
      - name: Install Python deps
        if: steps.e2e-config.outputs.configured == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r tests_selenium/requirements.txt
      - name: Setup Chrome
        if: steps.e2e-config.outputs.configured == 'true'
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Write .env for Vite
        if: steps.e2e-config.outputs.configured == 'true'
        run: |
          {
            echo "VITE_SUPABASE_URL=$VITE_SUPABASE_URL"
            echo "VITE_SUPABASE_PUBLISHABLE_KEY=$VITE_SUPABASE_PUBLISHABLE_KEY"
            echo "VITE_SUPABASE_PROJECT_ID=$VITE_SUPABASE_PROJECT_ID"
          } > .env

      - name: Start dev server
        if: steps.e2e-config.outputs.configured == 'true'
        run: |
          nohup bun run dev > /tmp/dev.log 2>&1 &
          echo "Aguardando dev server..."
          for i in $(seq 1 60); do
            curl -sf http://localhost:8080 > /dev/null && echo "✓ pronto" && exit 0
            sleep 2
          done
          echo "✗ dev server não subiu"; tail -200 /tmp/dev.log; exit 1

      - name: Run Selenium (${{ matrix.spec }})
        if: steps.e2e-config.outputs.configured == 'true'
        run: |
          python -m pytest tests_selenium/tests/test_plan_limits_${{ matrix.spec }}.py \
            --junitxml=reports/junit-${{ matrix.spec }}.xml

      - name: Dump dev server log on failure
        if: failure() && steps.e2e-config.outputs.configured == 'true'
        run: tail -300 /tmp/dev.log || true

      - name: Upload JUnit report
        if: always() && steps.e2e-config.outputs.configured == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: selenium-report-${{ matrix.spec }}
          path: reports/
          retention-days: 14
